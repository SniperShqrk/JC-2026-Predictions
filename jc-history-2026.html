<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>

  body { background: #0a0a0f; }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: #0a0a0f; }
  ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }

<script type="text/babel">

      prediction: "HOT",

      keyPoints: ["How archaeologists date artefacts", "Primary vs secondary sources", "How to evaluate evidence", "Archive methods"]
    },
    {

      strand: "S3",

    },
    {

      prediction: "HOT",
      note: "Appeared 3 of 4 years. Absent in 2025 — almost certain to return. Easter Rising, War of Independence, Treaty, Civil War.",
      keyPoints: ["Easter Rising causes & consequences", "War of Independence 1919–21", "Anglo-Irish Treaty debate", "Irish Civil War"]
    },
    {

      strand: "S3",
      appeared: { 2022: "Q7*", 2023: "Q6", 2024: "–", 2025: "–" },
      prediction: "HOT",
      note: "Not tested in 2024 or 2025. Two years overdue.",
      keyPoints: ["Nazi persecution steps (1933–45)", "Concentration/death camps", "Survivors' testimonies as evidence", "Why it must be remembered"]
    },
    {
      topic: "The Troubles in Northern Ireland",
      strand: "S2",
      appeared: { 2022: "–", 2023: "Q7", 2024: "–", 2025: "–" },
      prediction: "HOT",
      note: "Only appeared 2023. Two years overdue.",
      keyPoints: ["Causes: discrimination, civil rights", "Bloody Sunday", "Peace process & Good Friday Agreement", "Sutton Index / documenting evidence"]
    },
    {
      topic: "1798 Rebellion",
      strand: "S2",
      appeared: { 2022: "Q4", 2023: "–", 2024: "–", 2025: "–" },
      prediction: "HOT",
      note: "Only appeared in 2022. Three years without — very overdue.",
      keyPoints: ["United Irishmen & Wolfe Tone", "French support", "Battle of Vinegar Hill", "Consequences for Ireland"]
    },
    {
      topic: "Ancient Rome / Ancient Civilisation",
      strand: "S3",
      appeared: { 2022: "Q1*", 2023: "Q1*", 2024: "–", 2025: "–" },
      prediction: "HOT",
      note: "Ancient Rome as a standalone has never appeared. Overdue.",
      keyPoints: ["Roman achievements: law, roads, aqueducts", "Roman army & conquest", "Julius Caesar / Augustus", "Legacy of Rome in Europe"]
    },
    {
      topic: "The GAA",
      strand: "S2",
      appeared: { 2022: "Q8*", 2023: "Q8", 2024: "–", 2025: "–" },
      prediction: "WARM",
      note: "Last appeared 2023. Part of 'sporting/cultural/social movement' question — could return as Q8.",
      keyPoints: ["Founding 1884 (Thurles)", "Role in Irish identity", "GAA and political links", "Women in GAA (camogie)"]
    },
    {
      topic: "The 1960s (Ireland/Europe/World)",
      strand: "S2/S3",
      appeared: { 2022: "Q8*", 2023: "–", 2024: "Q8", 2025: "–" },
      prediction: "WARM",
      note: "Appeared 2022 and 2024 (every 2 years in Q8). Pattern suggests 2026 is possible again.",
      keyPoints: ["Lemass & economic growth in Ireland", "Civil rights movement (USA)", "Space race", "Cultural change / youth culture"]
    },
    {
      topic: "Life in a Communist / Fascist State",
      strand: "S3",
      appeared: { 2022: "Q7", 2023: "–", 2024: "Q7", 2025: "–" },
      prediction: "WARM",
      note: "Appeared in 2022 and 2024 (every 2 years). Pattern suggests 2026 could see it again.",
      keyPoints: ["Stalin: collectivisation, gulags, purges", "Hitler: Nuremberg Laws, propaganda, youth groups", "Mussolini: fascism in Italy", "Propaganda as a tool of control"]
    },
    {
      topic: "Parliamentary Tradition / Parnell",
      strand: "S2",
      appeared: { 2022: "–", 2023: "–", 2024: "Q5", 2025: "–" },
      prediction: "WARM",
      note: "Only appeared once (2024). Could return — Parnell & Home Rule is examinable.",
      keyPoints: ["Parnell & Land League", "Home Rule bills (1886, 1893, 1912)", "O'Connell & Catholic Emancipation", "Parliamentary methods vs armed rebellion"]
    },
    {
      topic: "The Renaissance",
      strand: "S3",
      appeared: { 2022: "Q2", 2023: "–", 2024: "–", 2025: "–" },
      prediction: "WARM",
      note: "Only appeared 2022. Three years without — possible but less exam-weight than other topics.",
      keyPoints: ["Humanist thinkers", "Art: Da Vinci, Michelangelo", "Printing press impact", "Contrast with medieval worldview"]
    },
    {
      topic: "EU or UN",
      strand: "S2/S3",
      appeared: { 2022: "–", 2023: "–", 2024: "–", 2025: "–" },
      prediction: "WARM",
      note: "Never appeared in any exam 2022–2025. Wild card — could appear but hard to predict format.",
      keyPoints: ["Origins of EU after WWII", "Ireland's accession 1973", "UN peacekeeping", "Benefits of European integration"]
    },
    {
      topic: "The Reformation",
      strand: "S3",
      appeared: { 2022: "–", 2023: "Q2", 2024: "–", 2025: "Q2" },
      prediction: "COLD",
      note: "Just appeared in 2025 as Q2. Very unlikely to repeat.",
      keyPoints: []
    },
    {
      topic: "Conquest & Colonisation / Ulster Plantation",
      strand: "S2/S3",
      appeared: { 2022: "Q3", 2023: "–", 2024: "Q3", 2025: "Q3" },
      prediction: "COLD",
      note: "Appeared in 2025 (Ulster Plantation). Skip in 2026.",
      keyPoints: []
    },
    {
      topic: "French Revolution",
      strand: "S3",
      appeared: { 2022: "Q4*", 2023: "–", 2024: "–", 2025: "Q4" },
      prediction: "COLD",
      note: "Just appeared as Q4 in 2025.",
      keyPoints: []
    },
    {
      topic: "The Great Famine",
      strand: "S2",
      appeared: { 2022: "Q5", 2023: "Q3", 2024: "–", 2025: "Q5" },
      prediction: "COLD",
      note: "Appeared 3 out of 4 years including 2025. Very unlikely.",
      keyPoints: []
    },
    {
      topic: "Women in 20th-Century Ireland",
      strand: "S2",
      appeared: { 2022: "–", 2023: "–", 2024: "–", 2025: "Q6" },
      prediction: "COLD",
      note: "Just appeared in 2025.",
      keyPoints: []
    },
    {
      topic: "The Cold War",
      strand: "S3",
      appeared: { 2022: "–", 2023: "–", 2024: "–", 2025: "Q7" },
      prediction: "COLD",
      note: "Just appeared in 2025.",
      keyPoints: []
    },
    {
      topic: "Patterns of Change",
      strand: "S2/S3",
      appeared: { 2022: "–", 2023: "–", 2024: "–", 2025: "Q8" },
      prediction: "COLD",
      note: "Just appeared in 2025.",
      keyPoints: []
    },
  ]
};

const years = [2022, 2023, 2024, 2025];

const colors = {
  HOT:  { bg: "#052e16", text: "#4ade80", label: "🔥 HIGH",   border: "#16a34a" },
  WARM: { bg: "#431407", text: "#fbbf24", label: "⚡ MEDIUM", border: "#d97706" },
  COLD: { bg: "#0f172a", text: "#818cf8", label: "❄️ LOW",    border: "#4338ca" },
};

function App() {
  const [filter, setFilter]   = React.useState("ALL");
  const [expanded, setExpand] = React.useState(null);

  const displayed = filter === "ALL"  ? data.topicHistory
                  : filter === "HOT"  ? data.topicHistory.filter(t => t.prediction === "HOT")
                  : filter === "WARM" ? data.topicHistory.filter(t => t.prediction === "WARM")
                  :                     data.topicHistory.filter(t => t.prediction === "COLD");

  const hot  = data.topicHistory.filter(t => t.prediction === "HOT").length;
  const warm = data.topicHistory.filter(t => t.prediction === "WARM").length;
  const cold = data.topicHistory.filter(t => t.prediction === "COLD").length;

  return (
    <div style={{ minHeight:"100vh", background:"#0a0a0f", color:"#e2e8f0", fontFamily:"Georgia, serif" }}>

      {/* Header */}
      <div style={{ background:"linear-gradient(135deg,#0f172a 0%,#1e1b4b 50%,#0f172a 100%)", borderBottom:"1px solid #334155", padding:"2rem 1.5rem 1.5rem", textAlign:"center" }}>
        <div style={{ fontSize:"0.65rem", letterSpacing:"0.3em", color:"#64748b", textTransform:"uppercase", marginBottom:"0.5rem" }}>
          Junior Certificate History · Common Level · Pattern Analysis
        </div>
        <h1 style={{ fontSize:"clamp(1.4rem,5vw,2.2rem)", fontWeight:"bold", margin:"0 0 0.25rem", background:"linear-gradient(90deg,#e2e8f0,#a78bfa,#e2e8f0)", WebkitBackgroundClip:"text", WebkitTextFillColor:"transparent", letterSpacing:"-0.02em" }}>
          2026 Exam Predictions
        </h1>
        <p style={{ color:"#64748b", fontSize:"0.78rem", margin:0 }}>
          Based on SEC papers 2022 · 2023 · 2024 · 2025 — topics longest absent rank highest
        </p>

        <div style={{ display:"flex", justifyContent:"center", gap:"2rem", marginTop:"1.2rem", flexWrap:"wrap" }}>
          {[
            { label:"🔥 High", count: hot,  color:"#4ade80" },
            { label:"⚡ Medium", count: warm, color:"#fbbf24" },
            { label:"❄️ Low",  count: cold, color:"#818cf8" },
          ].map(s => (
            <div key={s.label} style={{ textAlign:"center" }}>
              <div style={{ fontSize:"1.6rem", fontWeight:"bold", color:s.color, fontFamily:"monospace" }}>{s.count}</div>
              <div style={{ fontSize:"0.62rem", color:"#64748b", letterSpacing:"0.05em" }}>{s.label}</div>
            </div>
          ))}
        </div>
      </div>

      {/* Filter tabs */}
      <div style={{ display:"flex", gap:"0.5rem", padding:"1rem 1.5rem 0", justifyContent:"center", flexWrap:"wrap" }}>
        {["ALL","HOT","WARM","COLD"].map(f => (
          <button key={f} onClick={() => setFilter(f)} style={{
            padding:"0.4rem 1.1rem", borderRadius:"999px",
            border: filter===f ? "1px solid #a78bfa" : "1px solid #334155",
            background: filter===f ? "#1e1b4b" : "transparent",
            color: filter===f ? "#a78bfa" : "#64748b",
            cursor:"pointer", fontSize:"0.72rem", letterSpacing:"0.08em", fontFamily:"monospace"
          }}>
            {f==="HOT"?"🔥 HIGH":f==="WARM"?"⚡ MEDIUM":f==="COLD"?"❄️ LOW":"SHOW ALL"}
          </button>
        ))}
      </div>

      {/* Cards */}
      <div style={{ padding:"1rem 1rem 3rem", display:"flex", flexDirection:"column", gap:"0.6rem", maxWidth:"700px", margin:"0 auto" }}>
        {displayed.map(t => {
          const c = colors[t.prediction];
          const isOpen = expanded === t.topic;
          const hasPoints = t.keyPoints && t.keyPoints.length > 0;
          return (
            <div key={t.topic} onClick={() => hasPoints && setExpand(isOpen ? null : t.topic)} style={{
              background:`${c.bg}`,
              border:`1px solid ${c.border}55`,
              borderLeft:`3px solid ${c.border}`,
              borderRadius:"8px", padding:"0.85rem 1rem",
              cursor: hasPoints ? "pointer" : "default",
            }}>
              <div style={{ display:"flex", alignItems:"flex-start", justifyContent:"space-between", gap:"0.5rem" }}>
                <div style={{ flex:1 }}>
                  <div style={{ display:"flex", alignItems:"center", gap:"0.5rem", flexWrap:"wrap" }}>
                    <span style={{ fontSize:"0.58rem", background:`${c.border}33`, color:c.text, padding:"0.15rem 0.5rem", borderRadius:"4px", fontFamily:"monospace", letterSpacing:"0.1em" }}>
                      {c.label}
                    </span>
                    <span style={{ fontSize:"0.58rem", color:"#475569", fontFamily:"monospace" }}>{t.strand}</span>
                  </div>
                  <div style={{ fontSize:"0.95rem", fontWeight:"bold", marginTop:"0.3rem", color:"#e2e8f0" }}>{t.topic}</div>
                </div>
                {hasPoints && <div style={{ color:c.text, fontSize:"0.75rem", marginTop:"0.25rem", flexShrink:0 }}>{isOpen?"▲":"▼"}</div>}
              </div>

              {/* Year badges */}
              <div style={{ display:"flex", gap:"0.35rem", marginTop:"0.5rem", flexWrap:"wrap" }}>
                {years.map(y => {
                  const val = t.appeared[y];
                  const hit = val && val !== "–";
                  return (
                    <div key={y} style={{
                      fontSize:"0.58rem", fontFamily:"monospace", padding:"0.15rem 0.45rem", borderRadius:"4px",
                      background: hit ? `${c.border}33` : "#1e293b",
                      color: hit ? c.text : "#475569",
                      border:`1px solid ${hit ? c.border+"55" : "#334155"}`,
                    }}>
                      {y}: {val || "–"}
                    </div>
                  );
                })}
              </div>

              <div style={{ fontSize:"0.71rem", color:"#94a3b8", marginTop:"0.4rem", lineHeight:"1.45" }}>{t.note}</div>

              {isOpen && hasPoints && (
                <div style={{ marginTop:"0.7rem", paddingTop:"0.7rem", borderTop:`1px solid ${c.border}33` }}>
                  <div style={{ fontSize:"0.58rem", letterSpacing:"0.15em", color:c.text, marginBottom:"0.4rem", textTransform:"uppercase" }}>Key Points to Know</div>
                  {t.keyPoints.map((kp,j) => (
                    <div key={j} style={{ fontSize:"0.75rem", color:"#cbd5e1", padding:"0.2rem 0", display:"flex", gap:"0.4rem" }}>
                      <span style={{ color:c.text, flexShrink:0 }}>›</span>{kp}
                    </div>
                  ))}
                </div>
              )}
            </div>
          );
        })}
      </div>

      <div style={{ textAlign:"center", padding:"1rem", color:"#334155", fontSize:"0.58rem", letterSpacing:"0.05em", borderTop:"1px solid #1e293b" }}>
        SOURCE: SEC JC History Papers 2022–2025 · juniorcyclehistory.ie · Pattern analysis only — not official SEC guidance
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
